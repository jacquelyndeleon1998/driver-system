<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Schedule</title>

<style>
/* =========================
   Universal & Base Styles
========================= */
body {
    font-family: Arial, Helvetica, sans-serif;
    background: #eef3ef;
    margin: 0;
    padding: 20px;
    color: #111827;
}

a {
    color: #000;
    text-decoration: none;
}

h1 {
    text-align: center;
    color: #14532d;
    font-size: 28px;
    margin-bottom: 6px;
    font-weight: 700;
}

/* =========================
   Layout & Components
========================= */
.admin-toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 18px;
}

.admin-btn {
    background: #14532d;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: .2s;
}

.admin-btn:hover {
    background: #166534;
}

.phone-link {
    color: #111827;
    text-decoration: none;
    font-weight: 500;
}

.phone-link:hover {
    text-decoration: underline;
}

.driver-card {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,.08);
    border: 1px solid #e5e7eb;
}

.summary-card {
    background: #b7d58c;
    border-radius: 14px;
    padding: 8px;
    margin-bottom: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

.summary-header {
    background: #14532d;
    color: #fff;
    padding: 10px 12px;
    border-radius: 10px;
    margin-bottom: 8px;
    text-align: center;
}

.summary-header h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
}

.driver-header {
    background: #14532d;
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 8px;
    box-shadow: 0 2px 5px rgba(20,83,45,.15);
}

.driver-header h2 {
    margin: 0 0 12px;
    font-size: 17px;
    font-weight: 700;
    text-align: left;
}

.driver-header p {
    margin: 0;
    padding: 2px 0;
    line-height: 1.2;
    color: #fff;
}

.trip {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-left: 4px solid #14532d;
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
}

.trip-title {
    font-size: 14px;
    font-weight: 700;
    color: #14532d;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid #e5e7eb;
}

.trip p {
    margin: 0;
    padding: 2px 0;
    line-height: 1.2;
}

.allowance-btn {
    width: 100%;
    height: 46px;
    margin-top: 14px;
    background: #16a34a;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s ease;
}

.allowance-btn:active {
    transform: scale(.99);
}

.rest-day-row {
    background: #f8d7da;
    color: #721c24;
    font-weight: bold;
}

/* =========================
   App Header & Navigation
========================= */
.app-header {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 22px;
}

.app-left {
    display: flex;
    align-items: center;
    gap: 18px;
}

.app-logo {
    width: 72px;
    height: 72px;
    object-fit: contain;
    flex-shrink: 0;
}

.app-title h1 {
    margin: 0;
    font-size: 30px;
    color: #14532d;
    font-weight: 700;
    text-align: left;
    line-height: 1.1;
}

.app-subtitle {
    margin-top: 4px;
    font-size: 16px;
    font-weight: 600;
    color: #374151;
}

.app-description {
    margin-top: 6px;
    font-size: 13px;
    color: #6b7280;
}

.top-nav {
    width: 100%;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
    font-size: 13px;
    font-weight: 600;
    padding-right: 12px; 
}

.nav-btn {
    background: none;
    border: none;
    padding: 0;
    color: #6b7280;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: .2s;
}

.nav-btn:hover {
    color: #14532d;
}

.nav-btn.active {
    color: #16a34a;
}

.nav-separator {
    color: #9ca3af;
    user-select: none;
}

/* =========================
   Modals & Overlays
========================= */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 999;
    overflow-y: auto;
    padding: 15px;
    box-sizing: border-box;
}

.modal-content {
    background: #fff;
    width: 90%;
    max-width: 450px;
    max-height: 90vh;
    margin: 20px auto;
    padding: 20px;
    border-radius: 10px;
    overflow-y: auto;
    box-sizing: border-box;
}

.modal-title {
    margin-top: 0;
    color: #111827;
}

.modal-content input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

.modal-buttons {
    display: flex;
    gap: 12px;
    margin-top: 18px;
}

.modal-buttons .allowance-btn {
    flex: 1;
    margin-top: 0;
    height: 48px;
    border-radius: 8px;
}

.submit-btn { background: #16a34a; color: #fff; }
.submit-btn:hover { background: #15803d; }
.cancel-btn { background: #6b7280; color: #fff; }
.cancel-btn:hover { background: #4b5563; }

/* Form Fields inside Modal */
.trip-info-card {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 15px;
}

.info-item {
    display: flex;
    align-items: flex-start;
    gap: 4px;
    padding: 2px 0;
}

    min-width: 82px;

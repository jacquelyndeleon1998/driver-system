<!DOCTYPE html>
<html>
<head>
  <title>Driver System</title>
</head>

<body>

<h1>Driver Schedule</h1>

<table border="1" style="width:100%; border-collapse:collapse;">
  <thead>
    <tr style="background:#333; color:white;">
      <th>Date</th>
      <th>Driver</th>
      <th>Vehicle</th>
      <th>Requested By</th>
      <th>Origin</th>
      <th>Destination</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="tripTable"></tbody>
</table>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKU6d7IdZnlDr6HJxNFqipfhoGiqJ11Z_GOiaiiS8-h2yQyP82frWKKCg3r3YW-VC4bemRomYmz2E8/pub?gid=0&single=true&output=csv";

function submitAllowance(driver, date, vehicle) {

  const amount = prompt(
    `Enter allowance amount\n\nDriver: ${driver}\nDate: ${date}\nVehicle: ${vehicle}`
  );

  if (!amount) return;

  alert(
    `Allowance Submitted!\n\nDriver: ${driver}\nDate: ${date}\nVehicle: ${vehicle}\nAmount: ₱${amount}`
  );
}

window.onload = async function () {
  console.log("Page loaded");

  const table = document.getElementById("tripTable");

  if (!table) {
    console.error("tripTable NOT FOUND");
    return;
  }

  try {
    const response = await fetch(sheetURL);
    const data = await response.text();

    const rows = data.trim().split("\n").slice(1);

    rows.forEach(row => {
      const cols = row.split(",");

      if (cols.length < 7) return;

      const date = cols[1];
      const driver = cols[0];
      const vehicle = cols[3];
      const requestedBy = cols[4];
      const origin = cols[5];
      const destination = cols[6];

      const html = `
        <tr>
          <td>${date}</td>
          <td>${driver}</td>
          <td>${vehicle}</td>
          <td>${requestedBy}</td>
          <td>${origin}</td>
          <td>${destination}</td>
          <td>
            <button onclick="submitAllowance('${driver}','${date}','${vehicle}')">
              Submit
            </button>
          </td>
        </tr>
      `;

      table.innerHTML += html;
    });

  } catch (err) {
    console.error("FETCH ERROR:", err);
  }
};
</script>

</body>
</html>

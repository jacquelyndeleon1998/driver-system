<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKU6d7IdZnlDr6HJxNFqipfhoGiqJ11Z_GOiaiiS8-h2yQyP82frWKKCg3r3YW-VC4bemRomYmz2E8/pub?gid=0&single=true&output=csv";

async function loadTrips() {
  const response = await fetch(sheetURL);
  const data = await response.text();

  const rows = data.split("\n").slice(1);
  const table = document.getElementById("tripTable");

  rows.forEach(row => {
    const cols = row.split(",");

    if (cols.length < 6) return;

    const html = `
      <tr>
        <td>${cols[0]}</td>
        <td>${cols[1]}</td>
        <td>${cols[2]}</td>
        <td>${cols[3]}</td>
        <td>${cols[4]}</td>
        <td>${cols[5]}</td>
        <td><button onclick="alert('Allowance request')">Submit</button></td>
      </tr>
    `;

    table.innerHTML += html;
  });
}

loadTrips();
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Schedule</title>

<style>
body{font-family:Arial,sans-serif;background:#f3f4f6;margin:0;padding:15px}
h1{text-align:center;color:#333}
.driver-card{background:#fff;border-radius:12px;padding:15px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.driver-header{
    background:#1f2937;
    color:#fff;
    padding:12px;
    border-radius:8px;
    margin-bottom:12px;
}

.driver-header p{
    margin:0;
    padding:2px 0;
    line-height:1.2;
}

.trip{
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    margin-bottom:10px;
    background:#fafafa;
}

.trip-title{
    font-weight:bold;
    color:#2563eb;
    margin-bottom:4px;
}

.trip p{
    margin:0;
    padding:2px 0;
    line-height:1.2;
}
.allowance-btn{width:100%;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:8px;cursor:pointer}
a{color:#2563eb}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999}
.modal-content{background:#fff;max-width:450px;margin:40px auto;padding:20px;border-radius:10px}
.modal-content input{width:100%;padding:8px;margin-bottom:10px;box-sizing:border-box}
</style>
</head>
<body>

<h1>Driver Schedule</h1>
<div id="driversContainer"></div>

<div id="allowanceModal" class="modal">
  <div class="modal-content">
    <h3>Meal Allowance</h3>
    <p id="modalDriver"></p>
    <p id="modalDate"></p>
    <p id="modalPassenger"></p>

    <input id="allowanceTimeIn" type="time">
    <input id="allowanceTimeOut" type="time">
    <input id="allowanceBreakfast" type="number" placeholder="Breakfast Amount">
    <input id="allowanceLunch" type="number" placeholder="Lunch Amount">
    <input id="allowanceDinner" type="number" placeholder="Dinner Amount">
    <input id="allowanceParking" type="number" placeholder="Parking Fee Amount">

    <button class="allowance-btn" onclick="saveAllowance()">Submit</button>
    <br><br>
    <button class="allowance-btn" style="background:#6b7280" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQKU6d7IdZnlDr6HJxNFqipfhoGiqJ11Z_GOiaiiS8-h2yQyP82frWKKCg3r3YW-VC4bemRomYmz2E8/pub?gid=0&single=true&output=csv";
const appScriptURL="https://script.google.com/macros/s/AKfycbxIR8MUgDhWxBA0AeWe9WjpYyGONUHDQfZpmPxJBODzNHN1cQUPtK4lP-lxx3gt3Aa-/exec";

let currentDriver="", currentDate="", currentPassenger="";

function submitAllowance(driver,date,passenger){
 currentDriver=driver;
 currentDate=date;
 currentPassenger=passenger;
 document.getElementById("modalDriver").innerHTML="<b>Driver:</b> "+driver;
 document.getElementById("modalDate").innerHTML="<b>Date:</b> "+date;
 document.getElementById("modalPassenger").innerHTML="<b>Passenger(s):</b> "+passenger;
 document.getElementById("allowanceModal").style.display="block";
}

function closeModal(){
 document.getElementById("allowanceModal").style.display="none";
}

function saveAllowance(){
 const payload={
  tripDate:currentDate,
  driver:currentDriver,
  passenger:currentPassenger,
  timeIn:document.getElementById("allowanceTimeIn").value,
  timeOut:document.getElementById("allowanceTimeOut").value,
  breakfast:document.getElementById("allowanceBreakfast").value||0,
  lunch:document.getElementById("allowanceLunch").value||0,
  dinner:document.getElementById("allowanceDinner").value||0,
  parkingFee:document.getElementById("allowanceParking").value||0
 };

 fetch(appScriptURL,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(payload)
 })
 .then(r=>r.json())
 .then(()=>{
   alert("Allowance submitted successfully!");
   closeModal();
 })
 .catch(()=>alert("Error submitting allowance."));
}

window.onload=async function(){
 const response=await fetch(sheetURL);
 const data=await response.text();
 const rows=data.trim().split("\n").slice(1);

 const grouped={};

 rows.forEach(row=>{
   const cols=row.split(",");
   if(cols.length<9) return;

   const driver=cols[0];
   const date=cols[1];
   const timeIn=cols[2];
   const vehicle=cols[3];
   const itinerary=cols[4];
   const pickupTime=cols[5];
   const requestedBy=cols[6];
   const origin=cols[7];
   const destination=cols[8];
   const remarks=cols[9]||"";

   const key=driver+"_"+date;

   if(!grouped[key]){
      grouped[key]={driver,date,timeIn,vehicle,trips:[]};
   }

   grouped[key].trips.push({
      itinerary,pickupTime,requestedBy,origin,destination,remarks
   });
 });

 const container=document.getElementById("driversContainer");

 Object.keys(grouped).forEach(key=>{
   const d=grouped[key];

   let tripsHTML="";

   d.trips.forEach((trip,index)=>{
      tripsHTML += `
      <div class="trip">
        <div class="trip-title">Trip ${index+1}</div>
        <p><b>Itinerary:</b> ${trip.itinerary}</p>
        <p><b>Pick Up Time:</b> ${trip.pickupTime}</p>
        <p><b>Passenger:</b> ${trip.requestedBy}</p>
      <p><b>Origin:</b> 
  <a target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(trip.origin)}">
    ${trip.origin}
  </a>
</p>

<p><b>Destination:</b> 
  <a target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(trip.destination)}">
    ${trip.destination}
  </a>
</p>

<p><b>Remarks:</b> ${trip.remarks}</p>
      </div>`;
   });

   const passengers=[...new Set(d.trips.map(t=>t.requestedBy))].join(", ");

   container.innerHTML += `
   <div class="driver-card">
     <div class="driver-header">
       <h2>${d.driver}</h2>
       <p><b>Date:</b> ${d.date}</p>
       <p><b>Time In:</b> ${d.timeIn}</p>
       <p><b>Vehicle:</b> ${d.vehicle}</p>
     </div>

     ${tripsHTML}

     <button class="allowance-btn"
       onclick="submitAllowance('${d.driver}','${d.date}','${passengers}')">
       Submit Meal Allowance
     </button>
   </div>`;
 });
};
</script>

</body>
</html>

<!DOCTYPE html> 
<html>
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Driver Schedule</title>
      <style> body{ font-family:Arial,sans-serif; background:#f3f4f6; margin:0; padding:15px; } 
        h1{ text-align:center; color:#333; } .driver-card{ background:white; border-radius:12px; padding:15px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,.1); } .driver-header{ background:#1f2937; color:white; padding:12px; border-radius:8px; margin-bottom:12px; } .driver-header h2{ margin:0; font-size:20px; } .driver-header p{ margin:5px 0; } .trip{ border:1px solid #ddd; border-radius:8px; padding:10px; margin-bottom:10px; background:#fafafa; } .trip-title{ font-weight:bold; color:#2563eb; margin-bottom:8px; } .trip p{ margin:4px 0; font-size:14px; } .allowance-btn{ width:100%; padding:12px; background:#16a34a; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; } .allowance-btn:hover{ background:#15803d; } a{ color:#2563eb; text-decoration:underline; } </style>
   </head>

   
   <body>
      <h1>Driver Schedule</h1>
      <div id="driversContainer"></div>
     <script>

       
const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQKU6d7IdZnlDr6HJxNFqipfhoGiqJ11Z_GOiaiiS8-h2yQyP82frWKKCg3r3YW-VC4bemRomYmz2E8/pub?gid=0&single=true&output=csv";

function submitAllowance(driver,date){

    const timeIn = prompt("Time In:");
    if(timeIn === null) return;

    const timeOut = prompt("Time Out:");
    if(timeOut === null) return;

    const breakfast = Number(prompt("Breakfast Amount") || 0);
    const lunch = Number(prompt("Lunch Amount") || 0);
    const dinner = Number(prompt("Dinner Amount") || 0);
    const parkingFee = Number(prompt("Parking Fee Amount") || 0);

    const payload = {
        tripDate: date,
        driver: driver,
        passenger: "",
        timeIn: timeIn,
        timeOut: timeOut,
        breakfast: breakfast,
        lunch: lunch,
        dinner: dinner,
        parkingFee: parkingFee
    };

    fetch(
      "https://script.google.com/macros/s/AKfycbxIR8MUgDhWxBA0AeWe9WjpYyGONUHDQfZpmPxJBODzNHN1cQUPtK4lP-lxx3gt3Aa-/exec",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      }
    )
    .then(response => response.json())
    .then(data => {
        alert("Allowance submitted successfully!");
    })
    .catch(error => {
        console.error(error);
        alert("Error submitting allowance.");
    });
}

window.onload = async function(){

   <div id="allowanceModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999;">

  <div style="background:white;max-width:400px;margin:50px auto;padding:20px;border-radius:10px;">

    <h3>Meal Allowance</h3>

    <p id="modalDriver"></p>
    <p id="modalDate"></p>

    <input id="timeIn" type="time" placeholder="Time In"><br><br>

    <input id="timeOut" type="time" placeholder="Time Out"><br><br>

    <input id="breakfast" type="number" placeholder="Breakfast Amount"><br><br>

    <input id="lunch" type="number" placeholder="Lunch Amount"><br><br>

    <input id="dinner" type="number" placeholder="Dinner Amount"><br><br>

    <input id="parkingFee" type="number" placeholder="Parking Fee Amount"><br><br>

    <button onclick="saveAllowance()">Submit</button>

    <button onclick="closeModal()">Cancel</button>

  </div>

</div>

    const response = await fetch(sheetURL);
    const data = await response.text();

    const rows = data.trim().split("\n").slice(1);

    const grouped = {};

    rows.forEach(row => {

        const cols = row.split(",");

        if(cols.length < 9) return;

        const driver = cols[0];
        const date = cols[1];
        const timeIn = cols[2];
        const vehicle = cols[3];
        const itinerary = cols[4];
        const pickupTime = cols[5];
        const requestedBy = cols[6];
        const origin = cols[7];
        const destination = cols[8];
        const remarks = cols[9] || "";

     const key = driver + "_" + date;

if(!grouped[key]){
           grouped[key] = {
                date,
                timeIn,
                vehicle,
                trips:[]
            };
        }

        grouped[driver].trips.push({
            itinerary,
            pickupTime,
            requestedBy,
            origin,
            destination,
            remarks
        });

    });

    const container =
    document.getElementById("driversContainer");

  Object.keys(grouped).forEach(key=>{

    const d = grouped[key];
    const driver = d.driver;
     driver: driver,

        const d = grouped[driver];

        let tripsHTML = "";

        d.trips.forEach((trip,index) => {

            tripsHTML += `
            <div class="trip">

                <div class="trip-title">
                    Trip ${index + 1}
                </div>

                <p><b>Itinerary:</b> ${trip.itinerary}</p>

                <p><b>Pick Up Time:</b> ${trip.pickupTime}</p>

                <p><b>Passenger:</b> ${trip.requestedBy}</p>

                <p>
                    <b>Origin:</b>
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(trip.origin)}" target="_blank">
                        ${trip.origin}
                    </a>
                </p>

                <p>
                    <b>Destination:</b>
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(trip.destination)}" target="_blank">
                        ${trip.destination}
                    </a>
                </p>

                <p><b>Remarks:</b> ${trip.remarks}</p>

            </div>
            `;

        });

        container.innerHTML += `
        <div class="driver-card">

            <div class="driver-header">

                <h2>${driver}</h2>

                <p><b>Date:</b> ${d.date}</p>

                <p><b>Time In:</b> ${d.timeIn}</p>

                <p><b>Vehicle:</b> ${d.vehicle}</p>

            </div>

            ${tripsHTML}

          <button
class="allowance-btn"
onclick="submitAllowance(
'${driver}',
'${d.date}'
)">
Submit Your Meal Allowance
</button>

        </div>
        `;

    });

};
</script> 

      <div id="allowanceModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
z-index:999;
">

<div style="
background:white;
max-width:400px;
margin:50px auto;
padding:20px;
border-radius:10px;
">

<h3>Meal Allowance</h3>

<p id="modalDriver"></p>
<p id="modalDate"></p>

<input id="timeIn" type="time" placeholder="Time In"><br><br>

<input id="timeOut" type="time" placeholder="Time Out"><br><br>

<input id="breakfast" type="number" placeholder="Breakfast"><br><br>

<input id="lunch" type="number" placeholder="Lunch"><br><br>

<input id="dinner" type="number" placeholder="Dinner"><br><br>

<input id="parkingFee" type="number" placeholder="Parking Fee"><br><br>

<button onclick="saveAllowance()">Submit</button>
<button onclick="closeModal()">Cancel</button>

</div>
</div>
   </body>
</html>
